entries:
  - id: mdtools
    kind: term
    names:
      en: "mdtools"
      ja: "mdtools"
    description:
      en: "A collection of command line tools for Markdown and QMD documents."
      ja: "Markdown/QMD 文書の編集、変換、検証を補助するコマンドラインツール集。"

  - id: mdtools-core
    kind: term
    names:
      en: "mdtools.core"
      ja: "mdtools.core"
    description:
      en: "Shared internal modules for I/O, Markdown scanning, and Pandoc syntax handling."
      ja: "I/O、Markdown スキャン、Pandoc 構文処理を集約した内部共通モジュール群。"

  - id: mdsplit
    kind: term
    names:
      en: "mdsplit"
      ja: "mdsplit"
    description:
      en: "A tool that decomposes and composes Markdown/QMD documents by heading sections."
      ja: "Markdown/QMD 文書を見出し単位に分解・再構成するツール。"

  - id: langfilter
    kind: term
    names:
      en: "langfilter"
      ja: "langfilter"
    description:
      en: "A tool that filters Pandoc/Quarto language fenced divs by target language."
      ja: "Pandoc/Quarto の言語付き fenced div を対象言語で抽出するツール。"

  - id: mdhtml-rewrite
    kind: term
    names:
      en: "mdhtml-rewrite"
      ja: "mdhtml-rewrite"
    description:
      en: "A tool that inventories and rewrites HTML-ish Markdown into Quarto-friendly syntax."
      ja: "HTML 混在 Markdown を調査し、Quarto 向け記法へ変換するツール。"

  - id: glossary
    kind: term
    names:
      en: "glossary"
      ja: "glossary"
    description:
      en: "A tool that resolves term, constant, and symbol markers from definition files."
      ja: "用語・定数・記号マーカーを定義ファイルから解決するツール。"

  - id: hierarchy-json
    kind: term
    names:
      en: "hierarchy.json"
      ja: "hierarchy.json"
    description:
      en: "The mdsplit tree file that records section order, nesting, and file paths."
      ja: "mdsplit がセクション順序、階層、ファイルパスを記録するツリー定義ファイル。"

  - id: section-file
    kind: term
    names:
      en: "section file"
      ja: "section file"
    description:
      en: "A Markdown file generated by mdsplit for one document section."
      ja: "mdsplit が文書の 1 セクションごとに生成する Markdown ファイル。"

  - id: round-trip
    kind: term
    names:
      en: "round-trip"
      ja: "round-trip"
    description:
      en: "A verification that decompose and compose reproduce the canonical document exactly."
      ja: "decompose と compose で canonical 文書が完全に再現されることの検証。"

  - id: code-fence
    kind: term
    names:
      en: "code fence"
      ja: "code fence"
    description:
      en: "A Markdown fenced code block opened by three or more backticks or tildes."
      ja: "3 個以上のバッククォートまたはチルダで始まる Markdown の fenced code block。"

  - id: fenced-div
    kind: term
    names:
      en: "fenced div"
      ja: "fenced div"
    description:
      en: "A Pandoc/Quarto block written with ::: fences and attributes."
      ja: "::: と属性で表す Pandoc/Quarto のブロック記法。"

  - id: pandoc-attrs
    kind: term
    names:
      en: "Pandoc attributes"
      ja: "Pandoc attributes"
    description:
      en: "Classes and key-value attributes written inside braces such as {.note lang=en}."
      ja: "{.note lang=en} のように波括弧内へ書くクラスと key-value 属性。"

  - id: code-fence-tracker
    kind: term
    names:
      en: "CodeFenceTracker"
      ja: "CodeFenceTracker"
    description:
      en: "The mdtools.core.mdscan state helper for classifying code-fenced lines."
      ja: "code fence 内の行を判定する mdtools.core.mdscan の状態管理ヘルパ。"

  - id: unit
    kind: term
    names:
      en: "Processing Unit"
      ja: "プロセッシングユニット"
    abbr: "PU"
    description:
      en: "A sample glossary term used in documentation examples."
      ja: "文書例で使う glossary 用のサンプル用語。"

  - id: lmm
    kind: term
    names:
      en: "Local Memory Module"
      ja: "ローカルメモリモジュール"
    abbr: "LMM"
    description:
      en: "A sample abbreviated term used in glossary documentation."
      ja: "glossary 文書の例で使う略称付きサンプル用語。"

  - id: EMAX_WIDTH
    kind: const
    value: 4
    description:
      en: "A sample constant used in glossary documentation."
      ja: "glossary 文書の例で使うサンプル定数。"

  - id: D
    kind: symbol
    rtl_macro: EMAX_DEPTH
    description:
      en: "A sample symbol used in glossary documentation."
      ja: "glossary 文書の例で使うサンプル記号。"
